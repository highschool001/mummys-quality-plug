<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Mummy's Quality Plug</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📦</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f4f6f8; }
        .login-box { background: #fff; padding: 50px 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 90%; max-width: 400px; }
        .login-box .logo-icon { font-size: 48px; display: block; margin-bottom: 10px; }
        .login-box h2 { font-size: 22px; color: #2c3e50; margin-bottom: 6px; }
        .login-box p { font-size: 13px; color: #7f8c8d; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; text-align: center; margin-bottom: 15px; font-family: inherit; }
        .login-box input:focus { outline: none; border-color: #e67e22; }
        .login-box button { width: 100%; padding: 14px; background: #e67e22; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .login-box button:hover { background: #d35400; }
        .login-error { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }
        .login-error.show { display: block; }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-box">
        <span class="logo-icon">🔐</span>
        <h2>Admin Login</h2>
        <p>Enter password to access the admin panel</p>
        <input type="password" id="admin-password" placeholder="Enter password" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">Login</button>
        <p class="login-error" id="login-error">Incorrect password. Try again.</p>
    </div>
</div>
<script>
let csrfToken = '';

// Fetch CSRF token when page loads
fetch('/api/csrf-token', { credentials: 'same-origin' })
    .then(r => r.json())
    .then(d => { csrfToken = d.csrfToken; });

async function login(){
    var pw = document.getElementById('admin-password').value;
    try {
        var res = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': csrfToken
            },
            credentials: 'same-origin',
            body: JSON.stringify({ password: pw })
        });
        if (res.ok) {
            var data = await res.json();
            sessionStorage.setItem('adminToken', data.token);
            window.location.href = 'admin.html';
        } else {
            document.getElementById('login-error').classList.add('show');
            document.getElementById('admin-password').value = '';
        }
    } catch (err) {
        document.getElementById('login-error').classList.add('show');
        document.getElementById('admin-password').value = '';
    }
}
</script>
</body>
</html>
