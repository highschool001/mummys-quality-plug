<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Mummy's Quality Plug</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .track-page { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .track-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); text-align: center; }
        .track-box input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; text-align: center; margin: 20px 0; }
        .track-box button { width: 100%; padding: 14px; background: #e67e22; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .track-result { margin-top: 30px; display: none; }
        .status-timeline { text-align: left; position: relative; padding-left: 30px; border-left: 3px solid #e67e22; }
        .status-step { margin-bottom: 25px; position: relative; }
        .status-step .dot { position: absolute; left: -37px; top: 0; width: 14px; height: 14px; background: #e67e22; border-radius: 50%; }
        .status-step .dot.done { background: #27ae60; }
        .status-step h4 { font-size: 14px; color: #2c3e50; }
        .status-step p { font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo">
                <span class="logo-icon">📦</span>
                <div class="logo-text">
                    <h1>Mummy's Quality Plug</h1>
                    <p>Quality imports, delivered to your door.</p>
                </div>
            </div>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="cart.html" id="cart-link">🛒 Cart</a></li>
                <li><a href="track-order.html" class="active">Track Order</a></li>
            </ul>
        </nav>
    </header>

    <section class="track-page">
        <div class="track-box">
            <h2>📦 Track Your Order</h2>
            <p>Enter your Order ID to check delivery status</p>
            <input type="text" id="order-id-input" placeholder="e.g. MQP-12345678">
            <button onclick="trackOrder()">Track Order</button>
            <div class="track-result" id="track-result"></div>
        </div>
    </section>

    <script>
        async function trackOrder() {
            var orderId = document.getElementById('order-id-input').value.trim();
            if (!orderId) { alert('Please enter your Order ID'); return; }

            try {
                var response = await fetch('/api/orders');
                var orders = await response.json();
                var order = orders.find(function(o) { return o.id === orderId; });

                var resultDiv = document.getElementById('track-result');
                if (!order) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = '<p style="color:#e74c3c; margin-top:20px;">Order not found. Please check your Order ID.</p>';
                    return;
                }

                var statuses = ['Order Confirmed', 'Sourcing', 'In Transit to Nigeria', 'Arrived Locally', 'Out for Delivery', 'Delivered'];
                var currentIndex = statuses.indexOf(order.status);

                var html = '<h3 style="margin-bottom:20px;">Order: ' + order.id + '</h3>';
                html += '<div class="status-timeline">';

                for (var i = 0; i < statuses.length; i++) {
                    var done = i <= currentIndex;
                    html += '<div class="status-step">';
                    html += '<span class="dot' + (done ? ' done' : '') + '"></span>';
                    html += '<h4>' + statuses[i] + '</h4>';
                    if (done && order.statusHistory) {
                        var historyEntry = order.statusHistory.find(function(h) { return h.status === statuses[i]; });
                        if (historyEntry) {
                            html += '<p>' + new Date(historyEntry.date).toLocaleDateString('en-NG', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + '</p>';
                        }
                    }
                    html += '</div>';
                }

                html += '</div>';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = html;
            } catch (error) {
                document.getElementById('track-result').style.display = 'block';
                document.getElementById('track-result').innerHTML = '<p style="color:#e74c3c;">Error loading order. Please try again.</p>';
            }
        }
    </script>
</body>
</html>
